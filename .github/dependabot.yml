version: 2
updates:
  # -----------------------------
  # 1. GitHub Actions
  # -----------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    groups:
      actions:
        patterns:
          - "*"
    open-pull-requests-limit: 3

  # -----------------------------
  # 2. Docker
  # -----------------------------
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
    groups:
      docker-images:
        patterns:
          - "*"
    open-pull-requests-limit: 3

  # -----------------------------
  # 3. npm (optional)
  # -----------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
    groups:
      node-packages:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  # -----------------------------
  # 4. pip (optional)
  # -----------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:45"
    allow:
      - dependency-type: "direct"
    groups:
      python-deps:
        patterns:
          - "*"
    insecure-external-code-execution: "deny"
    open-pull-requests-limit: 3

