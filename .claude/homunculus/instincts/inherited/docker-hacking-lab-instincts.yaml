# Docker Hacking Lab Workflow Add Multiformat Course Document

## Action

Follow the add-multiformat-course-document workflow:
1. Create or update the document in Markdown (.md).
2. Convert or export the document to DOCX (.docx).
3. Convert or export the document to PDF (.pdf).
4. For summaries, optionally add HTML (.html) format.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: container-security-course/course_outline.md, container-security-course/course_outline.docx, container-security-course/course_outline.pdf

