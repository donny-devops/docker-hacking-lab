# Docker Hacking Lab Workflow Add New Course Module

## Action

Follow the add-new-course-module workflow:
1. Create a new module directory under container-security-course/ with a descriptive name (e.g., module_01_fundamentals).
2. Add video scripts for each topic in the module in .md, .docx, and .pdf formats.
3. Add a module summary script in .md, .docx, and .pdf formats.
4. Add questions for the module in .md, .docx, and .pdf formats.
5. Add metadata for the module in .md, .docx, and .pdf formats.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: container-security-course/module_XX_*/video_YY_script.md, container-security-course/module_XX_*/video_YY_script.docx, container-security-course/module_XX_*/video_YY_script.pdf

